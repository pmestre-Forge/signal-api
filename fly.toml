# fly.toml app configuration file generated for signal-api-lively-sky-8407 on 2026-04-15T11:22:56+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'signal-api-lively-sky-8407'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = 'botwire_data'
  destination = '/app/data'
  initial_size = '1gb'
