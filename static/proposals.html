<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotWire Proposals — Governance Dashboard</title>
<meta name="robots" content="noindex">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;color:#d0d0d0;line-height:1.6;font-size:15px}
nav{padding:15px 20px;border-bottom:1px solid #222}
nav a{color:#4CAF50;text-decoration:none;font-weight:600;font-size:0.95em}
.c{max-width:1100px;margin:0 auto;padding:30px 20px 60px}
h1{color:#fff;font-size:2em;margin-bottom:8px}
.lede{color:#888;margin-bottom:30px}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filters button{background:#141414;color:#aaa;border:1px solid #2a2a2a;border-radius:20px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:0.88em}
.filters button.active{background:#1a3a1a;color:#4CAF50;border-color:#4CAF50}
.list{display:grid;gap:12px}
.card{background:#141414;border:1px solid #262626;border-radius:10px;padding:18px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#4CAF50}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.card h3{color:#fff;font-size:1.05em;flex:1;font-weight:600}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:20px;font-size:0.72em;font-weight:600}
.b-type{background:#1a1a3a;color:#6C9FFF}
.b-approved{background:#1a3a1a;color:#4CAF50}
.b-rejected{background:#3a1a1a;color:#ff6b6b}
.b-pending{background:#3a2a00;color:#FFD700}
.b-modify{background:#2a1a3a;color:#c084fc}
.b-executed{background:#1a3a2a;color:#10b981}
.b-failed{background:#3a1a1a;color:#ff6b6b}
.card-meta{color:#777;font-size:0.82em;display:flex;gap:10px}
.card-desc{color:#aaa;font-size:0.92em;margin-top:6px;max-height:3em;overflow:hidden;text-overflow:ellipsis}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;padding:30px;overflow-y:auto}
.modal.on{display:block}
.modal-inner{max-width:780px;margin:0 auto;background:#141414;border:1px solid #333;border-radius:12px;padding:28px;position:relative}
.close{position:absolute;top:12px;right:18px;background:none;border:none;color:#888;font-size:1.6em;cursor:pointer}
.close:hover{color:#fff}
.modal h2{color:#fff;font-size:1.4em;margin-bottom:8px;padding-right:40px}
.modal-section{margin-top:24px}
.modal-section h4{color:#999;font-size:0.85em;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
pre{background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:14px;overflow-x:auto;font-family:ui-monospace,monospace;font-size:0.88em;color:#e0e0e0;white-space:pre-wrap}
.empty{color:#666;text-align:center;padding:60px 20px}
.stats-row{display:flex;gap:20px;margin-bottom:25px;flex-wrap:wrap}
.stat-mini{background:#141414;border:1px solid #262626;border-radius:8px;padding:10px 16px}
.stat-mini .k{color:#888;font-size:0.78em}
.stat-mini .v{color:#fff;font-size:1.3em;font-weight:700}
</style>
</head>
<body>
<nav><a href="/">&larr; BotWire</a> &middot; <a href="/status">Status</a> &middot; <a href="/pricing">Pricing</a></nav>
<div class="c">
<h1>Governance Dashboard</h1>
<p class="lede">Every proposal reviewed by the 104-persona legion + acting CEO agent before it ships.</p>

<div class="stats-row" id="stats">
  <div class="stat-mini"><div class="k">Pending</div><div class="v" id="s-pending">—</div></div>
  <div class="stat-mini"><div class="k">Approved</div><div class="v" id="s-approved">—</div></div>
  <div class="stat-mini"><div class="k">Rejected</div><div class="v" id="s-rejected">—</div></div>
  <div class="stat-mini"><div class="k">Executed</div><div class="v" id="s-executed">—</div></div>
  <div class="stat-mini"><div class="k">Total</div><div class="v" id="s-total">—</div></div>
</div>

<div class="filters">
  <button class="active" data-f="all">All</button>
  <button data-f="pending">Pending</button>
  <button data-f="approved">Approved</button>
  <button data-f="rejected">Rejected</button>
  <button data-f="executed">Executed</button>
  <button data-f="failed">Failed</button>
  <button data-f="modify">Needs modify</button>
</div>

<div class="list" id="list"><div class="empty">Loading…</div></div>
</div>

<div class="modal" id="modal">
  <div class="modal-inner">
    <button class="close" onclick="closeModal()">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
let allProposals = [];
let currentFilter = "all";

function badge(status) {
  const m = {pending:"Pending",approved:"Approved",rejected:"Rejected",modify:"Needs modify",executed:"Executed",failed:"Failed",auditing:"Auditing"};
  return `<span class="badge b-${status}">${m[status]||status}</span>`;
}
function fmtDate(ts) {
  if (!ts) return "";
  return new Date(ts*1000).toLocaleString();
}
function render() {
  const filtered = currentFilter === "all" ? allProposals : allProposals.filter(p => p.status === currentFilter);
  const list = document.getElementById("list");
  if (!filtered.length) {
    list.innerHTML = `<div class="empty">No ${currentFilter === "all" ? "" : currentFilter} proposals.</div>`;
    return;
  }
  list.innerHTML = filtered.map(p => `
    <div class="card" onclick="openDetail('${p.id}')">
      <div class="card-head">
        <h3>${escape(p.title)}</h3>
        <div class="badges">${badge(p.status)}<span class="badge b-type">${p.type}</span></div>
      </div>
      <div class="card-meta">
        <span>by ${p.proposer}</span>
        <span>${fmtDate(p.created_at)}</span>
        ${p.legion_verdict ? `<span>Legion: ${p.legion_verdict}</span>` : ""}
        ${p.ceo_decision ? `<span>CEO: ${p.ceo_decision}</span>` : ""}
      </div>
    </div>
  `).join("");
}
function escape(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

async function load() {
  const r = await fetch("/proposals?format=json");
  allProposals = await r.json();
  const counts = {};
  for (const p of allProposals) counts[p.status] = (counts[p.status]||0) + 1;
  document.getElementById("s-pending").textContent = counts.pending || 0;
  document.getElementById("s-approved").textContent = counts.approved || 0;
  document.getElementById("s-rejected").textContent = counts.rejected || 0;
  document.getElementById("s-executed").textContent = counts.executed || 0;
  document.getElementById("s-total").textContent = allProposals.length;
  render();
}

async function openDetail(id) {
  const r = await fetch("/proposals/" + id);
  const p = await r.json();
  const body = document.getElementById("modal-body");
  const lv = p.legion_verdict;
  const cd = p.ceo_decision;
  body.innerHTML = `
    <h2>${escape(p.title)}</h2>
    <div style="margin-top:6px" class="badges">${badge(p.status)}<span class="badge b-type">${p.type}</span></div>

    <div class="modal-section">
      <h4>Description</h4>
      <pre>${escape(p.description)}</pre>
    </div>

    ${lv ? `
    <div class="modal-section">
      <h4>Legion verdict: <span style="color:#4CAF50">${lv.verdict}</span> (${lv.persona_count} personas)</h4>
      <div style="color:#aaa;font-size:0.9em;margin-bottom:8px">
        SHIP ${lv.tally?.SHIP ?? 0} · DON'T SHIP ${lv.tally?.["DON'T SHIP"] ?? 0} · WITH CHANGES ${lv.tally?.["SHIP WITH CHANGES"] ?? 0} · OTHER ${lv.tally?.OTHER ?? 0}
      </div>
      <pre>${escape(lv.brief || "")}</pre>
    </div>
    ` : ""}

    ${cd ? `
    <div class="modal-section">
      <h4>CEO decision: <span style="color:#4CAF50">${cd.decision}</span> (confidence ${Math.round((cd.confidence||0)*100)}%)</h4>
      <pre>${escape(cd.reasoning || "")}</pre>
      <div style="color:#888;margin-top:10px;font-size:0.9em"><strong>Next step:</strong> ${escape(cd.execution_hint || "—")}</div>
      <div style="color:#666;margin-top:6px;font-size:0.85em">Auto-execute safe: ${cd.safe_to_auto_execute ? "yes" : "no (manual)"}</div>
    </div>
    ` : ""}

    ${p.executor_notes ? `
    <div class="modal-section">
      <h4>Executor notes</h4>
      <pre>${escape(p.executor_notes)}</pre>
    </div>
    ` : ""}

    <div style="color:#666;font-size:0.82em;margin-top:20px">
      ID: <code style="background:#0d0d0d;padding:2px 6px;border-radius:4px;color:#f1fa8c">${p.id}</code> ·
      Created ${fmtDate(p.created_at)} by ${escape(p.proposer)}
    </div>
  `;
  document.getElementById("modal").classList.add("on");
}
function closeModal() { document.getElementById("modal").classList.remove("on"); }
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") closeModal();
});

for (const b of document.querySelectorAll(".filters button")) {
  b.addEventListener("click", () => {
    document.querySelectorAll(".filters button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    currentFilter = b.dataset.f;
    render();
  });
}

load();
setInterval(load, 30000); // refresh every 30s
</script>
</body>
</html>
